[target.xtensa-esp32-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"

[unstable]
build-std = ["std", "panic_abort"]

[alias]
check-esp = "check --target xtensa-esp32-espidf"
clippy-esp = "clippy --target xtensa-esp32-espidf -- -D warnings"
test-host = "test --lib"
build-esp = "build --target xtensa-esp32-espidf"

[build]
rustflags = [
    # NOTE: -W flags removed — they leak into dependency crates.
    # Use #![warn(..)] in src/lib.rs instead for crate-local linting.
]

[env]
MCU = "esp32"
ESP_IDF_VERSION = "v6.0.1"
IDF_PATH = "D:\\ecttr\\.embuild\\espressif\\esp-idf\\v6.0.1"
LIBCLANG_PATH = "C:\\Users\\vlbes\\.rustup\\toolchains\\esp\\xtensa-esp32-elf-clang\\esp-clang\\bin"
