id: LL-022
date: 2026-07-07
crash_signature: WiFi AP not visible — no crash — C app_main() called but Rust main()
  never executes — all stubs present in ELF
category: instrumentation_gap
trigger_patterns:
- Calling app_main\(\)
- no Rust output after app_main
- WiFi AP not visible
- app_main = 16 bytes
- mmio boot marker not printed
lesson: "Two dead-end investigations were triggered by using the wrong disassembler.\
  \ Key lessons:\n1. GNU `xtensa-esp-elf-objdump` CANNOT decode LLVM-generated Xtensa\n\
  \   instruction encodings. The bytes are valid Xtensa — the official\n   esp-clang\
  \ `llvm-objdump` decodes them correctly. This is a known\n   incompatibility between\
  \ the GNU binutils disassembler and the LLVM\n   code generator, NOT a toolchain\
  \ bug. Always use llvm-objdump from\n   esp-clang to disassemble Rust code:\n  \
  \   /home/vlabe/.espressif/tools/esp-clang/esp-20.1.1_20250829/esp-clang/bin/llvm-objdump\
  \ \\\n       -d target/xtensa-esp32s3-espidf/debug/ecotiter\n\n2. The linker map\
  \ (`libespidf.map`) is the definitive source for\n   symbol resolution, not `nm`\
  \ or `objdump`. When the linker map\n   shows `app_main` at a `.text.app_main` section\
  \ in the Rust rlib,\n   the Rust definition IS selected — regardless of what `nm`\
  \ byte\n   sizes or `objdump` decode quality suggest.\n\n3. When the symptom is\
  \ \"Rust main() never executes\" and the Rust\n   app_main is confirmed present\
  \ and correctly linked, the next\n   suspect is NOT the linker but the runtime:\
  \ stack corruption on\n   entry, PSRAM allocator mismatch, or a hardware exception\
  \ before\n   the first log line. In this case, the root cause remains unknown\n\
  \   after ruling out duplicate symbols and toolchain bugs.\n\n4. Is it possible\
  \ the issue is that `main.c` IS compiled with the\n   ESP-IDF component build system\
  \ (using xtensa-esp-elf-gcc), while\n   the Rust `app_main` from esp-idf-sys uses\
  \ Rust's LLVM backend.\n   Can app_main work if C and Rust objects use different\
  \ Xtensa\n   instruction encoding? Yes — the Xtensa ISA is the same; only the\n\
  \   binary encoding of certain instructions differs between LLVM and\n   GNU assemblers.\
  \ The CPU decodes the same bytes regardless of\n   which compiler produced them.\
  \ The incompatibility is in the\n   disassembler (human-readable output), NOT in\
  \ the machine code.\n\n5. Always include `llvm-objdump` in any post-mortem toolkit.\n\
  \   Update scripts/build.sh to set an alias or env var pointing to it.\n"
diagnostic: "1. Check which disassembler was used: xtensa-esp-elf-objdump (GNU)\n\
  \   will fail on Rust functions; llvm-objdump (esp-clang) will succeed.\n2. Check\
  \ the linker map for the source of app_main: if it's in\n   libesp_idf_sys-*.rlib,\
  \ the Rust definition is linked correctly.\n3. If both symbol link and code validity\
  \ are confirmed, the root\n   cause is runtime (stack/heap/hw exception) — not build/link.\n\
  4. Use `nm --print-size` on the rlib archive directly to check if\n   the Rust app_main\
  \ has reasonable size (16 bytes = entry + l32r +\n   callx8 + retw.n, which is correct\
  \ for a thin bridge function).\n"
fix: "Always use the LLVM disassembler from the esp-clang toolchain for Rust code:\n\
  \  alias xtensa-objdump='/home/vlabe/.espressif/tools/esp-clang/esp-20.1.1_20250829/esp-clang/bin/llvm-objdump'\n\
  \nWhen investigating \"main() never executed\" with the link confirmed correct,\
  \ move immediately to runtime diagnostics: check stack watermark, PSRAM initialization\
  \ sequence, and place boot markers via direct MMIO UART writes (not println!/log!)\
  \ to find exactly where execution stops.\n"
