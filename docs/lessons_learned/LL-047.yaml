id: LL-047
date: 2026-07-13
crash_signature: 'rst:0x10 (RTCWDT_RTC_RST) every ~8-9 seconds after BOOT OK. No Guru Meditation, no panic handler. Logs show
  "DBG: gRtcWdt IS NULL!" repeated every 100-300ms. "DBG: step 5 - RWDT DISABLED" printed at boot. Stack watermarks healthy.
  Deterministic: every boot.

  '
category: rtc_wdt_not_fed
trigger_patterns:
- rst:0x10.*RTCWDT_RTC_RST
- gRtcWdt IS NULL
- step 5 - RWDT DISABLED
lesson: "RTC Watchdog Timer (RWDT) hardware reset caused by the RtcWatchdog RAII wrapper being commented out in app_main(),\
  \ while CONFIG_BOOTLOADER_WDT_DISABLE_IN_USER_CODE=y remains set in sdkconfig.defaults.\nMECHANISM: 1. CONFIG_BOOTLOADER_WDT_DISABLE_IN_USER_CODE=y\
  \ (sdkconfig.defaults line 26)\n   tells the ESP-IDF bootloader: \"Keep the RTC WDT enabled — the app will\n   manage it.\"\
  \ The bootloader configures RWDT with a 9-second timeout\n   (CONFIG_BOOTLOADER_WDT_TIME_MS=9000 default).\n\n2. ESP-IDF's\
  \ startup code (startup_funcs.c:132-141) checks:\n     #if SOC_RTC_WDT_SUPPORTED && !defined(CONFIG_BOOTLOADER_WDT_DISABLE_IN_USER_CODE)\n\
  \   Since the flag IS defined (=y), the init_disable_rtc_wdt() function is\n   NOT compiled in. RWDT stays active with bootloader's\
  \ timeout.\n\n3. In app_main() (main.cpp:310-311), the RtcWatchdog RAII wrapper was\n   commented out (// diag::RtcWatchdog\
  \ rtcWdt;) and gRtcWdt explicitly set\n   to nullptr. RWDT never fed.\n\n4. Meanwhile, motor_task.cpp correctly guarded\
  \ gRtcWdt usage with\n   \"if (diag::gRtcWdt) diag::gRtcWdt->feed();\" — detecting it was NULL\n   and logging \"DBG: gRtcWdt\
  \ IS NULL!\" but doing nothing about it.\n\n5. After ~8-9 seconds, RWDT timeout expires → rst:0x10 (RTCWDT_RTC_RST).\nDistinguishing\
  \ from LL-045 (UNICORE RWDT deadlock): - LL-045 requires CONFIG_FREERTOS_UNICORE=y and WiFi active - LL-047 occurs with\
  \ CONFIG_FREERTOS_UNICORE=n (dual-core) - LL-045 shows frozen tick counter; LL-047 shows active log output - LL-045 Saved\
  \ PC is _xt_lowint1; LL-047 has no Saved PC (hardware reset)\n"
diagnostic: "1. Check boot log for \"gRtcWdt IS NULL!\" — confirms global pointer is null\n2. Check main.cpp for \"// diag::RtcWatchdog\
  \ rtcWdt;\" (commented-out RAII wrapper)\n3. Check sdkconfig.defaults for CONFIG_BOOTLOADER_WDT_DISABLE_IN_USER_CODE=y\n\
  4. Check startup_funcs.c: init_disable_rtc_wdt() is gated by\n   !defined(CONFIG_BOOTLOADER_WDT_DISABLE_IN_USER_CODE)\n\
  5. Timing: reset occurs ~8-9s after BOOT OK (matches CONFIG_BOOTLOADER_WDT_TIME_MS=9000)\n"
fix: "1. main/main.cpp: Uncomment the RtcWatchdog RAII instance and set global pointer:\n     diag::RtcWatchdog rtcWdt;\n\
  \     diag::gRtcWdt = &rtcWdt;\n\n2. main/main.cpp: Uncomment the main loop feed:\n     rtcWdt.feed();\n\n3. components/diag/src/rtc_watchdog.cpp:\
  \ Ensure constructor sets gRtcWdt = this\n   and destructor clears gRtcWdt = nullptr (belt-and-suspenders RAII).\n\nOR (alternative\
  \ — if RWDT is not needed):\n- Set CONFIG_BOOTLOADER_WDT_DISABLE_IN_USER_CODE=n in sdkconfig.defaults\n  to let ESP-IDF\
  \ auto-disable the RWDT at startup.\n\nThe RAII approach is preferred (keeps RWDT active as ultimate crash protection).\n"
