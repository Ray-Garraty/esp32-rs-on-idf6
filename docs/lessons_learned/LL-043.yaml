  - docs/crash_reports/2026-07-11_ip_event_stack_overflow.md (original LL-038)
  - docs/lessons_learned/LL-038.yaml
  - main/main.cpp (lines 185-189, worker creation)
  - components/infrastructure/network/src/http_server.cpp (line 543, broadcastWsEvent)
  - /home/vlabe/Downloads/esp-idf-master/components/esp_http_server/src/httpd_ws.c (line 512-570, synchronous send)
