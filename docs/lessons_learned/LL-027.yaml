id: LL-027
date: 2026-07-08
crash_signature: "rst:0x8 (TG1WDT_SYS_RST) at gpio_set_direction(GPIO_NUM_26) in StepperMotor ctor"
category: gpio_psram_conflict
trigger_patterns:
  - "rst:0x8.*TG1WDT_SYS_RST"
  - "gpio_set_direction.*GPIO_NUM_26"
  - "StepperMotor ctor B.*before gpio_set_direction"
  - "MSPI_IOMUX_PIN_NUM_CS1"
lesson: >
  On ESP32-S3 with octal PSRAM, GPIOs 26-37 are used by the MSPI controller for
  the PSRAM interface. Specifically:
    - GPIO 26 = MSPI CS1 (PSRAM Chip Select)
    - GPIO 27 = MSPI HD (PSRAM Hold/Data)
    - GPIO 28 = MSPI WP (PSRAM Write Protect)
    - GPIO 29-37 = other PSRAM data/clock pins

  Calling gpio_set_direction() on any of these pins causes a system hang because
  the GPIO driver tries to reconfigure the IOMUX, which conflicts with the active
  MSPI controller. The IWDT fires after 500ms (interrupts disabled), followed by
  a TG1WDT_SYS_RST reset.

  gpio_set_level() works on these pins (it only writes to the output register),
  but gpio_set_direction(), gpio_config(), and any other function that touches
  the IOMUX will hang.

  ALWAYS check the PSRAM pin map before assigning GPIOs for peripherals.
  On ESP32-S3 with octal PSRAM, avoid GPIOs 26-37 for any function that requires
  IOMUX reconfiguration (gpio_set_direction, gpio_config).

  Safe GPIOs on ESP32-S3-DevKitC-1: 5-13, 15-20, 38-42, 43-47
  (excluding 1-3 UART, 4 ADC, 14 valve, 21 RMT, 48 LED)
  After LL-027 fix: DS18B20 moved to GPIO6, Limit FULL to GPIO7, Limit HOME to GPIO15
diagnostic: "Check MSPI_IOMUX_PIN_NUM_* in soc/spi_pins.h before assigning GPIOs"
fix: "Move DIR from GPIO26 to GPIO5, DS18B20 from GPIO33 to GPIO6, Limit FULL from GPIO34 to GPIO7, Limit HOME from GPIO35 to GPIO15. EN on GPIO27 uses gpio_set_level only (no gpio_set_direction)."
refs:
  - docs/crash_reports/2026-07-08_gpio26_psram_cs1_wdt_bootloop.md
  - components/esp_hal_gpspi/esp32s3/include/soc/spi_pins.h
  - components/esp_psram/esp32s3/esp_psram_impl_octal.c